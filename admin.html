<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理面板 - 智慧農業看板</title>
    <link rel="stylesheet" href="style.css">
    <script>
        // 簡單的安全檢查 (防止未登入直接進入)
        if (sessionStorage.getItem('isAdmin') !== 'true') {
            alert('未經授權，請先登入！');
            window.location.href = 'login.html';
        }
    </script>
    <style>
        /* 管理頁專用樣式 */
        .status-card { color: white; border: none; }
        .status-card h3 { opacity: 0.8; font-size: 1rem; margin-bottom: 10px; }
        .status-card .value { font-size: 2.5rem; font-weight: bold; }
        .status-card .desc { font-size: 0.9rem; opacity: 0.9; }

        /* 醒目的狀態顏色 */
        .status-danger { background-color: var(--danger-color); box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4); }
        .status-success { background-color: var(--success-color); box-shadow: 0 4px 15px rgba(39, 174, 96, 0.4); }

        .btn-water {
            background: white; color: var(--text-main); border: none;
            padding: 10px 20px; border-radius: 20px; font-weight: bold;
            cursor: pointer; transition: var(--transition); margin-top: 15px;
        }
        .btn-water:hover { background: #ecf0f1; transform: scale(1.05); }
    </style>
</head>
<body>

    <nav class="navbar" style="grid-template-areas: 'time toggle' 'menu menu'; justify-content: space-between;">
        <div class="nav-time" id="current-time">載入中...</div>
        <div class="menu-toggle" id="mobile-menu-icon"><span></span><span></span><span></span></div>
        <ul class="nav-menu" id="nav-menu">
            <li><a href="index.html">首頁概況</a></li>
            <li><a href="charts.html">氣象圖表</a></li>
            <li><a href="login.html">管理者登入</a></li>
            <li><a href="#" onclick="logout()" style="color:var(--danger-color)">登出</a></li>
        </ul>
    </nav>

    <main>
        <h2>農作物灌溉管理面板</h2>
        <div class="card-grid" style="margin-top: 20px;">
            <div class="info-card status-card status-danger">
                <h3>土壤溫度</h3>
                <p class="value">35°C</p>
                <p class="desc">狀態：偏高</p>
            </div>
            <div class="info-card status-card status-success">
                <h3>環境濕度</h3>
                <p class="value">60%</p>
                <p class="desc">狀態：正常</p>
            </div>
            <div class="info-card" style="text-align:center;">
                <h3>灌溉控制</h3>
                <p style="margin: 10px 0; color:#7f8c8d;">灑水系統狀態：待命</p>
                <button class="btn-water" style="background:var(--primary-color); color:white;">啟動灑水系統</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        function logout() {
            sessionStorage.removeItem('isAdmin');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
