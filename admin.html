<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理面板 - What the Farm</title>
    <link rel="stylesheet" href="main.css">
    <script>
        // 簡單的安全檢查 (防止未登入直接進入)
        if (sessionStorage.getItem('isAdmin') !== 'true') {
            alert('未經授權，請先登入！');
            window.location.href = 'login.html';
        }
    </script>
    <style>
        /* 管理頁專用樣式 */
        .status-card { color: white; border: none; }
        .status-card h3 { opacity: 0.8; font-size: 1rem; margin-bottom: 10px; }
        .status-card .value { font-size: 2.5rem; font-weight: bold; }
        .status-card .desc { font-size: 0.9rem; opacity: 0.9; }

        
        .btn-water {
            background: white; color: var(--text-main); border: none;
            padding: 10px 20px; border-radius: 20px; font-weight: bold;
            cursor: pointer; transition: var(--transition); margin-top: 15px;
        }
        .btn-water:hover { background: #ecf0f1; transform: scale(1.05); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">What the Farm</div>
        <div class="nav-time" id="current-time">載入中...</div>
        
        <div class="menu-toggle" id="mobile-menu-icon">
            <span></span><span></span><span></span>
        </div>

        <ul class="nav-menu" id="nav-menu">
            <li><a href="index.html" >首頁概況</a></li>
            <li><a href="charts.html">氣象圖表</a></li>
            <li><a href="login.html">管理者登入</a></li>
        </ul>
    </nav>

    <main>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>管理面板</h2>
            <p id="admin-welcome">歡迎回來，管理者</p>
        </div>

        <section class="card" style="margin-top:20px; text-align:left;">
            <h3>⚙️ 系統偏好設定</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:15px;">
                <div>
                    <label>監測地區：</label>
                    <select id="pref-region" onchange="savePref()">
                        <option value="Taipei">臺北市</option>
                        <option value="Taichung">臺中市</option>
                        <option value="Kaohsiung">高雄市</option>
                        <option value="Hualien">花蓮縣</option>
                    </select>
                </div>
                <div>
                    <label>聯網設備金鑰 (API Key)：</label>
                    <input type="password" id="iot-key" placeholder="輸入金鑰" onchange="saveSecret()">
                </div>
            </div>
        </section>
        
        <h2>農作物灌溉管理面板</h2>
        <div class="card-grid" style="margin-top: 20px;">
            <div class="info-card" style="text-align:center;">
                <h3>灌溉控制</h3>
                <p style="margin: 10px 0; color:#7f8c8d;">灑水系統狀態：待命</p>
                <button class="btn-water" style="background:var(--primary-color); color:white;">啟動灑水系統</button>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
    <script>
        function logout() {
            sessionStorage.removeItem('isAdmin');
            window.location.href = 'login.html';
        }
        // 進入頁面時讀取名稱與設定
        document.addEventListener('DOMContentLoaded', () => {
            const user = sessionStorage.getItem('adminName') || '管理員';
            document.getElementById('admin-welcome').innerText = `歡迎回來，${user}`;
            
            // 讀取之前存好的地區
            document.getElementById('pref-region').value = localStorage.getItem('userRegion') || 'Taipei';
        });

        function savePref() {
            const region = document.getElementById('pref-region').value;
            localStorage.setItem('userRegion', region);
            alert('監測地區已更新為：' + region);
        }

        function saveSecret() {
            const key = document.getElementById('iot-key').value;
            // 僅存在 Session，避免永久留在電腦上
            sessionStorage.setItem('iot_secret', key);
            alert('金鑰已加密暫存');
        }
    </script>
</body>
</html>
