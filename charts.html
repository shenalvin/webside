<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>氣象圖表 - 智慧農業看板</title>
    <link rel="stylesheet" href="main.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">What the Farm</div>
        <div class="nav-time" id="current-time">載入中...</div>
        
        <div class="menu-toggle" id="mobile-menu-icon">
            <span></span><span></span><span></span>
        </div>

        <ul class="nav-menu" id="nav-menu">
            <li><a href="index.html" class="active">首頁概況</a></li>
            <li><a href="charts.html">氣象圖表</a></li>
            <li><a href="login.html">管理者登入</a></li>
        </ul>
    </nav>

    <main>
        <h2>一週氣象趨勢 (分區預報)</h2>
        
        <div class="card-grid">
            <div class="info-card">
                <h3>北部地區 - 溫度趨勢</h3>
                <div style="height:200px;"><canvas id="temp-north"></canvas></div>
                <h3 style="margin-top:20px;">北部地區 - 降雨機率</h3>
                <div style="height:150px;"><canvas id="rain-north"></canvas></div>
            </div>

            <div class="info-card">
                <h3>中部地區 - 溫度趨勢</h3>
                <div style="height:200px;"><canvas id="temp-central"></canvas></div>
                <h3 style="margin-top:20px;">中部地區 - 降雨機率</h3>
                <div style="height:150px;"><canvas id="rain-central"></canvas></div>
            </div>

            </div>
    </main>

    <script src="script.js"></script>
    <script src="charts.js"></script>
</body>
</html>
