<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>氣象圖表 - 智慧農業看板</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 圖表頁專用樣式 */
        .chart-placeholder {
            background: #e0e0e0;
            border-radius: 8px;
            height: 300px;
            display: flex; align-items: center; justify-content: center;
            color: #7f8c8d; border: 2px dashed #bdc3c7;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <nav class="navbar" style="grid-template-areas: 'time toggle' 'menu menu'; justify-content: space-between;">
        <div class="nav-time" id="current-time" style="text-align: left; grid-area: time;">載入中...</div>
        <div class="menu-toggle" id="mobile-menu-icon"><span></span><span></span><span></span></div>
        <ul class="nav-menu" id="nav-menu">
            <li><a href="index.html">首頁概況</a></li>
            <li><a href="charts.html" class="active">氣象圖表</a></li>
            <li><a href="login.html">管理者登入</a></li>
        </ul>
    </nav>

    <main>
        <h2>一週氣象趨勢</h2>
        <div class="info-card" style="margin-top:15px;">
            <h3>溫度趨勢 (摺線圖根)</h3>
            <div class="chart-placeholder">[ 這裡將顯示 Chart.js 摺線圖 ]</div>
            
            <h3>降雨統計 (長條圖)</h3>
            <div class="chart-placeholder">[ 這裡將顯示 Chart.js 長條圖 ]</div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
