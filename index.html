<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首頁 - What the Farm</title>
    <link rel="stylesheet" href="main.css">
    <style>
        /* 僅首頁需要的樣式 */
        .weather-info p { margin: 5px 0; font-size: 0.95rem; }
        .weather-info strong { color: var(--primary-color); font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="alert-container"></div>

    <nav class="navbar">
        <div class="nav-brand">What the Farm</div>
        <div class="nav-time" id="current-time">載入中...</div>
        
        <div class="menu-toggle" id="mobile-menu-icon">
            <span></span><span></span><span></span>
        </div>

        <ul class="nav-menu" id="nav-menu">
            <li><a href="index.html" class="active">首頁概況</a></li>
            <li><a href="charts.html">氣象圖表</a></li>
            <li><a href="login.html">管理者登入</a></li>
        </ul>
    </nav>

    <header class="hero-banner">
        <h1>智慧農業即時資訊看板</h1>
        <p>即時監測與預警系統</p>
    </header>

    <main>
        <section class="emergency-bar">
            <span>🔥 高溫警報：今日北部地區預估突破 38°C，請注意補水與撒水。</span>
        </section>

        <section>
            <h2 style="margin-bottom: 15px;">即時氣象預測 (分區)</h2>
            <div class="card-grid">
                <div class="info-card">
                    <h3 style="text-align:center; margin-bottom:10px;">北部</h3>
                    <div class="weather-info" style="display:flex; justify-content:space-around; text-align:center;">
                        <div><p>溫度</p><strong>28°C</strong></div>
                        <div><p>降雨機率</p><strong>20%</strong></div>
                    </div>
                </div>
                <div class="info-card">
                    <h3 style="text-align:center; margin-bottom:10px;">中部</h3>
                    <div class="weather-info" style="display:flex; justify-content:space-around; text-align:center;">
                        <div><p>溫度</p><strong>30°C</strong></div>
                        <div><p>降雨機率</p><strong>10%</strong></div>
                    </div>
                </div>
                </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
