<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首頁 - What the Farm</title>
    <link rel="stylesheet" href="main.css">
    <style>
        /* 僅首頁需要的樣式 */
        .weather-info p { margin: 5px 0; font-size: 0.95rem; }
        .weather-info strong { color: var(--primary-color); font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="alert-container"></div>

    <nav class="navbar">
        <div class="nav-brand">What the Farm</div>
        <div class="nav-time" id="current-time">載入中...</div>
        
        <div class="menu-toggle" id="mobile-menu-icon">
            <span></span><span></span><span></span>
        </div>

        <ul class="nav-menu" id="nav-menu">
            <li><a href="index.html" >首頁概況</a></li>
            <li><a href="charts.html">氣象圖表</a></li>
            <li><a href="login.html">管理者登入</a></li>
        </ul>
    </nav>

    <header class="hero-banner">
        <h1>智慧農業即時資訊看板</h1>
        <p>即時監測與預警系統</p>
    </header>

    <main>
        <section class="emergency-bar">
            <span>🔥 高溫警報：今日北部地區預估突破 38°C，請注意補水與撒水。</span>
        </section>

        <h2>農作物灌溉管理面板</h2>
        <div class="card-grid" style="margin-top: 20px;">
            <div class="info-card status-card status-danger">
                <h3>土壤溫度</h3>
                <p class="value">35°C</p>
                <p class="desc">狀態：偏高</p>
            </div>
            <div class="info-card status-card status-success">
                <h3>環境濕度</h3>
                <p class="value">60%</p>
                <p class="desc">狀態：正常</p>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
